name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      - name: Verify Git Availability
        shell: bash
        run: |
          set -euo pipefail
          git --version

      - name: Restore
        shell: bash
        run: dotnet restore src/XenoAtom.Glob.slnx

      - name: Build
        shell: bash
        run: dotnet build src/XenoAtom.Glob.slnx -c Release --no-restore

      - name: Test
        shell: bash
        run: dotnet test src/XenoAtom.Glob.Tests/XenoAtom.Glob.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

  build_test_pack_publish:
    needs: test
    runs-on: 'ubuntu-latest'

    steps:
      - name: "Build, Test, Pack and Publish"
        uses: xoofx/.github/.github/actions/dotnet-releaser-action@main
        with:
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
