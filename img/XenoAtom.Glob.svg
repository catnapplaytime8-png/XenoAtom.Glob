<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-labelledby="title desc">

  <title id="title">XenoAtom.Glob</title>
  <desc id="desc">A glowing six-rayed asterisk — the universal glob wildcard —
    encircled by a tilted orbital ring, on a dark indigo plate with
    violet-to-cyan accents.</desc>

  <defs>
    <!--
      ════════════════════════════════════════════════════════
        COLOR PALETTE
      ════════════════════════════════════════════════════════
        Background plate:  #0D0B1E  → #080616   (deep indigo)
        Accent gradient:   #8B5CF6  → #6366F1  → #06B6D4
                           (violet  → indigo   → cyan)
        Bright accent:     #C4B5FD  → #818CF8  → #67E8F9
                           (lt violet → lt indigo → lt cyan)
        Center glow:       #C4B5FD 30 % → #6366F1 10 % → transparent
        Orbital dots:      #67E8F9 (cyan)  ·  #C4B5FD (lt violet)
      ════════════════════════════════════════════════════════
    -->

    <!-- Background plate: deep-indigo diagonal gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D0B1E"/>
      <stop offset="1" stop-color="#080616"/>
    </linearGradient>

    <!-- Soft top-left highlight for a subtle 3-D feel -->
    <radialGradient id="shine" cx="0" cy="0" r="1"
                    gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(190 110) rotate(54) scale(350 270)">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Main accent: violet → indigo → cyan (diagonal) -->
    <linearGradient id="accent" x1="136" y1="80" x2="376" y2="432"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#8B5CF6"/>
      <stop offset="0.50" stop-color="#6366F1"/>
      <stop offset="1"    stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Brighter accent for plate inner ring and orbital path -->
    <linearGradient id="accentBright" x1="130" y1="60" x2="400" y2="460"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#C4B5FD"/>
      <stop offset="0.50" stop-color="#818CF8"/>
      <stop offset="1"    stop-color="#67E8F9"/>
    </linearGradient>

    <!-- Radial glow behind the asterisk centre -->
    <radialGradient id="centerGlow" cx="256" cy="256" r="110"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#C4B5FD" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for all foreground elements -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="8"
                    flood-color="#000000" flood-opacity="0.40"/>
    </filter>

    <!-- Refined two-layer glow: gentle outer + crisp inner -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"  result="outerGlow"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="innerGlow"/>
      <feMerge>
        <feMergeNode in="outerGlow"/>
        <feMergeNode in="innerGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND PLATE ═══ -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#shine)"/>

  <!-- ═══ PLATE BORDER STROKES ═══ -->
  <rect x="7" y="7" width="498" height="498" rx="121"
        fill="none" stroke="url(#accent)" stroke-opacity="0.55"
        stroke-width="14"/>
  <rect x="16" y="16" width="480" height="480" rx="112"
        fill="none" stroke="url(#accentBright)" stroke-opacity="0.60"
        stroke-width="4"/>

  <!-- ═══ FOREGROUND: GLOB ASTERISK + ORBIT ═══ -->
  <g filter="url(#shadow)">

    <!-- Ambient glow disc behind the asterisk -->
    <circle cx="256" cy="256" r="145" fill="url(#centerGlow)"/>

    <!--
      Orbital ring (tilted ellipse behind the asterisk).
      rx=210, ry=72, rotated −30° for an atomic orbit look.
    -->
    <g transform="translate(256,256) rotate(-30)">
      <ellipse cx="0" cy="0" rx="210" ry="72"
               fill="none" stroke="url(#accentBright)"
               stroke-width="7" stroke-opacity="0.70"/>
    </g>

    <!--
      GLOB ASTERISK — three tapered ellipses forming a 6-rayed * symbol.
      Each ellipse naturally tapers from wide at the centre to pointed
      tips, giving an elegant starburst look.
    -->
    <g filter="url(#glow)">
      <g transform="translate(256,256)">
        <ellipse cx="0" cy="0" rx="22" ry="170"
                 fill="url(#accent)"/>                                <!-- 0° -->
        <ellipse cx="0" cy="0" rx="22" ry="170"
                 fill="url(#accent)" transform="rotate(60)"/>        <!-- 60° -->
        <ellipse cx="0" cy="0" rx="22" ry="170"
                 fill="url(#accent)" transform="rotate(120)"/>       <!-- 120° -->
      </g>
    </g>

    <!-- Subtle white edge highlight on the asterisk rays -->
    <g transform="translate(256,256)"
       stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.5" fill="none">
      <ellipse cx="0" cy="0" rx="22" ry="170"/>
      <ellipse cx="0" cy="0" rx="22" ry="170" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="22" ry="170" transform="rotate(120)"/>
    </g>

    <!-- Bright centre: layered circles for a luminous core -->
    <circle cx="256" cy="256" r="34" fill="#C4B5FD" fill-opacity="0.35"/>
    <circle cx="256" cy="256" r="20" fill="#FFFFFF"  fill-opacity="0.94"/>

    <!-- Orbital dots (small spheres travelling along the ring) -->
    <g transform="translate(256,256) rotate(-30)">
      <!-- Leading dot (cyan, larger) — on the front arc -->
      <circle cx="202" cy="22"  r="12"  fill="#67E8F9" fill-opacity="0.90"/>
      <!-- Trailing dot (lt violet, smaller) — on the back arc -->
      <circle cx="-188" cy="-42" r="9" fill="#C4B5FD" fill-opacity="0.80"/>
    </g>

  </g>
</svg>
